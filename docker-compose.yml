version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# drawing2dxf — full local stack.
# Use `make up`. For GPU mode, see docker-compose.gpu.yml.
# ─────────────────────────────────────────────────────────────────────────────

x-python-env: &python-env
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
  POSTGRES_DSN: ${POSTGRES_DSN}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET:-drawing2dxf}
  MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
  ENABLE_GPU: ${ENABLE_GPU:-false}

x-go-env: &go-env
  KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
  POSTGRES_DSN: ${POSTGRES_DSN}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET:-drawing2dxf}
  MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
  API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL:-http://localhost:8080}

services:

  # ───────── Infra ─────────
  postgres:
    image: postgres:16-alpine
    container_name: d2d_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drawing2dxf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drawing2dxf}
      POSTGRES_DB: ${POSTGRES_DB:-drawing2dxf}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drawing2dxf}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [d2d]

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: d2d_redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
    ports:
      - "9092:9092"
      - "9644:9644"   # admin
      - "8082:8082"   # rest proxy
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks: [d2d]

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: d2d_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-drawing2dxf}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-drawing2dxf-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [d2d]

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: d2d_migrate
    profiles: ["tools"]
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN}
    volumes:
      - ./apps/api/internal/db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["migrate"]
    command: ["-path=/migrations", "-database=${POSTGRES_DSN}", "up"]
    networks: [d2d]

  # ───────── Go API ─────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: d2d_api
    environment:
      <<: *go-env
      API_HTTP_ADDR: ":8080"
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      API_CORS_ALLOWED_ORIGINS: ${API_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-2147483648}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks: [d2d]

  # ───────── Go Workers ─────────
  ingest-worker:
    build:
      context: ./workers-go/ingest-worker
      dockerfile: Dockerfile
    container_name: d2d_ingest
    environment:
      <<: *go-env
      MAX_ARCHIVE_FILES: ${MAX_ARCHIVE_FILES:-10000}
      MAX_ARCHIVE_DEPTH: ${MAX_ARCHIVE_DEPTH:-8}
      MAX_ARCHIVE_UNCOMPRESSED_BYTES: ${MAX_ARCHIVE_UNCOMPRESSED_BYTES:-21474836480}
    depends_on:
      api:
        condition: service_started
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [d2d]

  export-packager:
    build:
      context: ./workers-go/export-packager
      dockerfile: Dockerfile
    container_name: d2d_export_packager
    environment: *go-env
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [d2d]

  # ───────── Python services ─────────
  preprocess-service:
    build:
      context: ./services-python
      dockerfile: preprocess-service/Dockerfile
    container_name: d2d_preprocess
    environment: *python-env
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [d2d]

  ocr-service:
    build:
      context: ./services-python
      dockerfile: ocr-service/Dockerfile
    container_name: d2d_ocr
    environment:
      <<: *python-env
      OCR_WEIGHTS_DIR: ${OCR_WEIGHTS_DIR:-/models/paddleocr-pp-ocrv5}
      OCR_IMPL: ${OCR_IMPL:-mock}
    depends_on:
      redpanda:
        condition: service_healthy
    networks: [d2d]

  geometry-service:
    build:
      context: ./services-python
      dockerfile: geometry-service/Dockerfile
    container_name: d2d_geom
    environment: *python-env
    depends_on:
      redpanda:
        condition: service_healthy
    networks: [d2d]

  qa-service:
    build:
      context: ./services-python
      dockerfile: qa-service/Dockerfile
    container_name: d2d_qa
    environment: *python-env
    depends_on:
      redpanda:
        condition: service_healthy
    networks: [d2d]

  dxf-export-service:
    build:
      context: ./services-python
      dockerfile: dxf-export-service/Dockerfile
    container_name: d2d_dxf
    environment:
      <<: *python-env
      DXF_DEFAULT_VERSION: ${DXF_DEFAULT_VERSION:-R2010}
      DXF_FALLBACK_VERSION: ${DXF_FALLBACK_VERSION:-R2000}
    depends_on:
      redpanda:
        condition: service_healthy
    networks: [d2d]

  # ───────── Web UI ─────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: d2d_web
    environment:
      VITE_API_BASE_URL: ${WEB_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks: [d2d]

  # ───────── Observability ─────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: d2d_prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks: [d2d]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: d2d_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    networks: [d2d]

volumes:
  pg_data:
  minio_data:
  redpanda_data:
  grafana_data:

networks:
  d2d:
    driver: bridge
