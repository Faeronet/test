# Optional reverse-proxy snippet. Drop into /etc/nginx/conf.d/ on a host that
# wants to expose the local stack under a single domain. The default docker
# compose already publishes ports 5173 (web) and 8080 (api) directly.

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;     # SSE streaming
        proxy_cache off;
        proxy_read_timeout 1d;
    }

    location /metrics {
        return 404;
    }
}
